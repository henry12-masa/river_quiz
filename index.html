let quizData = [];

function buildQuizData() {
  const data = [];

  rivers.forEach((r, index) => {
    const [name, hint, place] = r;

    const wrongNames = rivers
      .filter((_, i) => i !== index)
      .sort(() => Math.random() - 0.5)
      .slice(0, 3)
      .map(x => x[0]);

    data.push({
      q: `${hint}はどの川？`,
      choices: shuffle([name, ...wrongNames]),
      answer: name
    });

    const wrongPlaces = [...new Set(rivers.map(x => x[2]))]
      .filter(x => x !== place)
      .sort(() => Math.random() - 0.5)
      .slice(0, 3);

    data.push({
      q: `${name}が主に関係する地域・国は？`,
      choices: shuffle([place, ...wrongPlaces]),
      answer: place
    });
  });

  return data;
}

let selectedQuiz = [];
let current = 0;
let score = 0;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function startQuiz() {
  quizData = buildQuizData();
  selectedQuiz = shuffle([...quizData]).slice(0, 30);
  current = 0;
  score = 0;

  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("result").textContent = "";
  document.getElementById("score").textContent = "";

  showQuestion();
}

function showQuestion() {
  const q = selectedQuiz[current];

  document.getElementById("progress").textContent = 
    `${current + 1} / ${selectedQuiz.length} 問目`;

  document.getElementById("question").textContent = q.q;

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  q.choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.className = "choice";
    btn.onclick = () => checkAnswer(btn, choice);
    choicesDiv.appendChild(btn);
  });
}

function checkAnswer(button, choice) {
  const q = selectedQuiz[current];
  const buttons = document.querySelectorAll(".choice");

  buttons.forEach(btn => btn.disabled = true);

  if (choice === q.answer) {
    button.classList.add("correct");
    document.getElementById("result").textContent = "正解！";
    score++;
  } else {
    button.classList.add("wrong");
    document.getElementById("result").textContent = `不正解。正解は「${q.answer}」`;
    buttons.forEach(btn => {
      if (btn.textContent === q.answer) btn.classList.add("correct");
    });
  }

  setTimeout(() => {
    current++;
    document.getElementById("result").textContent = "";

    if (current < selectedQuiz.length) {
      showQuestion();
    } else {
      finishQuiz();
    }
  }, 1200);
}

function finishQuiz() {
  document.getElementById("question").textContent = "クイズ終了！";
  document.getElementById("choices").innerHTML = "";
  document.getElementById("progress").textContent = "";
  document.getElementById("score").textContent =
    `あなたのスコア：${score} / ${selectedQuiz.length} 問`;
  document.getElementById("restartBtn").style.display = "inline-block";
}

startQuiz();
</script>
